<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нейросетевой OCR Сканер</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #ffffff;
            font-size: 20px;
        }
        .input-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .file-input-wrapper {
            text-align: center;
            margin-top: 10px;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            display: inline-block;
            padding: 14px 28px;
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .custom-file-upload:active {
            background-color: #0056b3;
        }
        #preview {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            display: none;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00cbc6;
            font-size: 14px;
        }
        .result-box {
            width: 100%;
            height: 250px;
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 15px;
            font-family: monospace;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Нейросетевой OCR Сканер</h2>
    
    <div class="input-group">
        <input type="text" id="hfToken" placeholder="Вставьте ваш Hugging Face Token (hf_...)">
    </div>
    
    <div class="file-input-wrapper">
        <label class="custom-file-upload">
            <input type="file" id="imageLoader" accept="image/*">
            Выбрать фото для точного анализа
        </label>
    </div>

    <img id="preview" alt="Исходное изображение">
    
    <div id="statusText" class="status">Введите токен и выберите изображение</div>
    
    <textarea id="resultText" class="result-box" readonly placeholder="Здесь появится идеальный текст без ошибок..."></textarea>
</div>

<script>
const imageLoader = document.getElementById('imageLoader');
const preview = document.getElementById('preview');
const statusText = document.getElementById('statusText');
const resultText = document.getElementById('resultText');
const hfTokenInput = document.getElementById('hfToken');

// Сохраняем токен в памяти браузера, чтобы не вводить каждый раз
if (localStorage.getItem('hf_ocr_token')) {
    hfTokenInput.value = localStorage.getItem('hf_ocr_token');
}

imageLoader.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const token = hfTokenInput.value.trim();
    if (!token) {
        statusText.innerText = 'Ошибка: Сначала введите Hugging Face Token!';
        return;
    }
    localStorage.setItem('hf_ocr_token', token);

    const reader = new FileReader();
    reader.onload = async function(event) {
        preview.src = event.target.result;
        preview.style.display = 'block';
        
        statusText.innerText = 'Отправка изображения в нейросеть...';
        resultText.value = '';

        // Извлекаем чистый Base64
        const base64Data = event.target.result.split(',')[1];

        try {
            // Используем передовую OCR-модель от Microsoft / Naver
            const response = await fetch(
                "https://api-inference.huggingface.co/models/naver-clova-ix/donut-base-finetuned-docvqa",
                {
                    headers: { 
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ image: base64Data }),
                }
            );

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || 'Ошибка сервера API');
            }

            const result = await response.json();
            statusText.innerText = 'Готово!';
            
            // Форматируем вывод ответа нейросети
            if (result && result[0] && result[0].generated_text) {
                resultText.value = result[0].generated_text;
            } else if (typeof result === 'string') {
                resultText.value = result;
            } else {
                resultText.value = JSON.stringify(result, null, 2);
            }

        } catch (err) {
            statusText.innerText = 'Ошибка нейросети';
            resultText.value = 'Не удалось распознать: ' + err.message + '\n\nУбедитесь, что токен активен, или подождите загрузки модели (первый запуск может занять до 20 секунд).';
        }
    };
    reader.readAsDataURL(file);
});
</script>

</body>
</html>
